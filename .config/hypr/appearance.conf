# --- GENEL AYARLAR ---

source = ~/.config/hypr/colors.conf
general {
    gaps_in = 2
    gaps_out = 5
    border_size = 2
    col.active_border = $color5
    col.inactive_border = $color9
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

# --- DEKORASYON AYARLARI ---
decoration {
    rounding = 10
    active_opacity = 0.78
    inactive_opacity = 0.7
    fullscreen_opacity = 1
    blur {
        enabled = true
        size = 3
        passes = 5
        new_optimizations = true
        ignore_opacity = true
        xray = false
        popups = true
    }
    shadow {
        enabled = false
        range = 15
        render_power = 5
        color = rgba(0,0,0,.5)
    }
}

# --- ANİMASYONLAR ---
animations {
    enabled = true
    bezier = fluid, 0.15, 0.85, 0.25, 1
    bezier = snappy, 0.3, 1, 0.4, 1
    animation = windows, 1, 3, fluid, popin 5%
    animation = windowsOut, 1, 2.5, snappy
    animation = fade, 1, 4, snappy
    animation = workspaces, 1, 1.7, snappy, slide
    animation = specialWorkspace, 1, 4, fluid, slidefadevert -35%
    animation = layers, 1, 2, snappy, popin 70%
}
