    $wallpaper = /home/celal/wallpapers/walls/flower.jpg
    $foregroundCol = 0xffc1c1c4
    $backgroundCol = 0xff080814
    $color0 = 0xff080814
    $color1 = 0xff5b067d
    $color2 = 0xff501893
    $color3 = 0xff650788
    $color4 = 0xff652289
    $color5 = 0xff700996
    $color6 = 0xff7b12a2
    $color7 = 0xff8c8c97
    $color8 = 0xff58586b
    $color9 = 0xff7A08A7
    $color10 = 0xff6B21C5
    $color11 = 0xff870AB6
    $color12 = 0xff872EB7
    $color13 = 0xff960CC9
    $color14 = 0xffA418D9
    $color15 = 0xffc1c1c4

general {
    hide_cursor = true
}

# Arka plan ayarları (tüm monitörler için ortak)
background {
    monitor =
    path = $wallpaper
    blur_size = 4
    blur_passes = 3
    brightness = 0.7
    contrast = 0.9
}

# Giriş alanı (yüzde tabanlı boyut, tüm çözünürlükler için uyumlu)
input-field {
    monitor =
    size = 15%, 5%  # Genişlik ekranın %25'i, yükseklik %6'sı
    outline_thickness = 2
    dots_rounding = 4
    dots_spacing = 0.3
    dots_fade_time = 300
    inner_color = $backgroundCol
    outer_color = $color8
    check_color = $color2
    fail_color = $color1
    font_color = $color15
    font_family = CodeNewRoman Nerd Font Propo
    fade_on_empty = false
    shadow_color = rgba(0,0,0,0.6)
    shadow_passes = 2
    shadow_size = 3
    rounding = 15
    placeholder_text = <i>Şifre Giriniz...</i>
    fail_text = <b>Hatalı Şifre!</b>
    fail_timeout = 500
    position = 0, -80  # Ekran merkezine yakın, yukarıda (piksel cinsinden)
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] date +"<b>%H</b>"
    color = $color9
    font_size = 90  
    font_family = CodeNewRoman Nerd Font Propo
    shadow_passes = 2
    shadow_size = 4
    position = -100, 200  # Ekranın sol-orta kısmında
    halign = center
    valign = center
}

# Dakika
label {
    monitor =
    text = cmd[update:1000] date +"<b>%M</b>"
    color = rgba(200,200,200,0.5)
    font_size = 90  # 1366x768 için ~90px, 1920x1080 için uygun
    font_family = CodeNewRoman Nerd Font Propo
    shadow_passes = 2
    shadow_size = 4
    position = 100, 150  # Ekranın sağ-orta kısmında
    halign = center
    valign = center
}

# Tarih
label {
    monitor =
    text = cmd[update:1000] date +"<b>%A, %B %d, %Y</b>"
    color = $color4
    font_size = 20  
    font_family = CodeNewRoman Nerd Font Propo
    shadow_passes = 1
    shadow_size = 3
    position = -30, -30  # Ekranın sağ üst köşesine yakın
    halign = right
    valign = top
}

# Kullanıcı selamlama
label {
    monitor =
    text = <i>Merhaba</i> <b>$USER</b>
    color = $color5
    font_size = 20  # 1366x768 için ~20px, 1920x1080 için uygun
    font_family = CodeNewRoman Nerd Font Propo
    shadow_passes = 1
    shadow_size = 3
    position = 30, -30  # Ekranın sol üst köşesine yakın
    halign = left
    valign = top
}
