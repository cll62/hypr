# --- KLAVYE VE FARE AYARLARI ---
input {
    kb_layout = tr
    follow_mouse = 1
    accel_profile = flat
    numlock_by_default = true
    touchpad {
        natural_scroll = false
        scroll_factor = 1
    }
    repeat_rate = 40
    repeat_delay = 600
}

# --- GESTURE AYARLARI ---
gestures {
    workspace_swipe = true
    workspace_swipe_distance = 300
    workspace_swipe_cancel_ratio = .05
    workspace_swipe_min_speed_to_force = 0
}

# --- AYGIT AYARLARI ---
device {
    name = epic-mouse-v1
    sensitivity = 0
}
