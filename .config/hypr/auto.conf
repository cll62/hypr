# --- BAŞLANGIÇTA ÇALIŞTIRILACAK UYGULAMALAR ---
exec-once = hypridle
exec-once = waybar &
exec-once = swww-daemon &
exec-once = ~/.config/hypr/script/bg_random.sh
exec-once = swaync &
exec-once = swayosd-server &
exec-once = hyprsunset &
exec-once = swaync-client -df &
exec-once = pactl set-sink-mute @DEFAULT_SINK@ 0
exec-once = hyprctl setcursor Bibata-Modern-Ice 12
exec-once = gsettings set org.gnome.desktop.interface cursor-theme "Bibata-Modern-Ice"
exec-once = gsettings set org.gnome.desktop.interface cursor-size 12
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = wl-paste --watch cliphist store
exec-once = udiskie -s
exec-once = ~/.config/hypr/script/gtk.sh
exec-once = systemctl --user import-environment &
exec-once = hash dbus-update-activation-environment 2>/dev/null &
exec-once = dbus-update-activation-environment --systemd &
