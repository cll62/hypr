[config.custom_colors]
red = { color = "#ff0000", blend = true }
green = { color = "#00ff00", blend = true }
blue = { color = "#0000ff", blend = true }
yellow = { color = "#ffff00", blend = true }
orange = { color = "#ff8000", blend = true }
purple = { color = "#8000ff", blend = true }

[config]
version_check = false

[templates.kitty]
input_path = "~/.config/matugen/templates/kitty-colors.conf"
output_path = "~/.config/kitty/colors-matugen.conf"
post_hook = "pkill -SIGUSR1 kitty"

[templates.waybar]
input_path = "~/.config/matugen/templates/colors.css"
output_path = "~/.config/waybar/colors.css"


[templates.wofi]
input_path = "~/.config/matugen/templates/colors.css"
output_path = "~/.config/wofi/colors.css"

[templates.swaync]
input_path = "~/.config/matugen/templates/colors.css"
output_path = "~/.config/swaync/colors.css"
post_hook = 'pkill swaync;swaync & disown'


[templates.swayosd]
input_path = "~/.config/matugen/templates/colors.css"
output_path = "~/.config/swayosd/colors.css"
post_hook = 'pkill swayosd-server;swayosd-server & disown'

[templates.hyprlock]
input_path = "~/.config/matugen/templates/hyprland-colors.conf"
output_path = "~/.config/hypr/colors.conf"

[templates.qt5ct]
input_path = '~/.config/matugen/templates/qtct-colors.conf'
output_path = '~/.config/qt5ct/colors/matugen.conf'

[templates.qt6ct]
input_path = '~/.config/matugen/templates/qtct-colors.conf'
output_path = '~/.config/qt6ct/colors/matugen.conf'

[templates.gtk3]
input_path = '~/.config/matugen/templates/gtk-colors.css'
output_path = '~/.config/gtk-3.0/colors.css'
post_hook = 'gsettings set org.gnome.desktop.interface gtk-theme ""; gsettings set org.gnome.desktop.interface gtk-theme "adw-gtk3-dark"'

[templates.gtk4]
input_path = '~/.config/matugen/templates/gtk-colors.css'
output_path = '~/.config/gtk-4.0/colors.css'

[templates.hyprland]
input_path = "~/.config/matugen/templates/hyprland-colors.conf"
output_path = "~/.config/hypr/colors.conf"
post_hook = "hyprctl reload"

[templates.zathura]
input_path = "~/.config/matugen/templates/zathura-colors"
output_path = '~/.config/zathura/zathurarc'

[templates.yazi]
input_path = "~/.config/matugen/templates/yazi-theme.toml"
output_path = '~/.config/yazi/theme.toml'
